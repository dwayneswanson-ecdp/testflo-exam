<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong — testflo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --navy: #0f172a; --ink: #1e293b; --slate: #475569;
      --muted: #94a3b8; --line: #e2e8f0; --surface: #f8fafc; --white: #ffffff;
      --blue: #2563eb; --red: #dc2626;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--surface); color: var(--ink); font-size: 16px; line-height: 1.7; padding-top: 56px; -webkit-font-smoothing: antialiased; }
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; background: var(--navy); padding: 0 40px; height: 56px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .header-logo img { height: 26px; width: auto; }
    main { max-width: 480px; margin: 60px auto; padding: 0 24px; }
    .card { background: var(--white); border: 1px solid var(--line); border-top: 4px solid var(--red); padding: 40px 36px; text-align: center; }
    .icon { display: flex; justify-content: center; margin-bottom: 20px; }
    .title { font-size: 1.4rem; font-weight: 700; color: var(--black); letter-spacing: -0.02em; margin-bottom: 8px; }
    .msg { font-size: 0.9rem; color: var(--slate); line-height: 1.7; margin-bottom: 24px; }
    .contact { font-size: 0.82rem; color: var(--muted); }
    .code { font-size: 0.72rem; color: var(--muted); margin-top: 20px; font-family: monospace; }
  </style>
</head>
<body>
  <header>
    <div class="header-logo"><img src="testflo-dark.svg" alt="testflo"></div>
    <div id="langToggleMount"></div>
  </header>
  <main>
    <div class="card">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="title" id="errTitle">Something went wrong</div>
      <div class="msg" id="errMsg" data-i18n="errMsgDefault">The page you're looking for couldn't be found, or you may not have permission to view it.</div>
      <div class="contact" data-i18n="contactAdmin">If you think this is an error, contact your administrator for assistance.</div>
      <div class="code" id="errCode"></div>
    </div>
  </main>

  <script src="lang.js"></script>
  <script>
    Lang.init({
      fr: {
        contactAdmin:  'Si vous pensez qu\'il s\'agit d\'une erreur, contactez votre administrateur.',
        errMsgDefault: 'La page que vous cherchez est introuvable, ou vous n\'avez pas l\'autorisation de la consulter.',
        errCodePrefix: 'Code d\'erreur : ',
      },
      en: {
        contactAdmin:  'If you think this is an error, contact your administrator for assistance.',
        errMsgDefault: 'The page you\'re looking for couldn\'t be found, or you may not have permission to view it.',
        errCodePrefix: 'Error code: ',
      }
    });
    document.addEventListener('langchange', function() { window.location.reload(); });
  </script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title  = params.get('title');
    const msg    = params.get('msg');
    const code   = params.get('code');
    if (title) document.getElementById('errTitle').textContent = title;
    if (msg)   document.getElementById('errMsg').textContent   = msg;
    if (code)  document.getElementById('errCode').textContent  = Lang.t('errCodePrefix') + code;
  </script>
</body>
</html>
